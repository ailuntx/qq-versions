name: Track QQ Linux

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Existing version to publish or republish with assets"
        required: false
        type: string
  schedule:
    - cron: "43 7 * * *"

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Test
        run: python -m unittest discover -s tests

      - name: Check latest version
        id: check
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            python scripts/track.py --update --version "${{ inputs.version }}"
          else
            python scripts/track.py --check
          fi

      - name: Update metadata and download assets
        if: steps.check.outputs.changed == 'true'
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            python scripts/track.py --update --download --version "${{ inputs.version }}"
          else
            python scripts/track.py --update --download
          fi
          python scripts/generate_readme.py

      - name: Commit metadata
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add versions.json README.md
          if git diff --cached --quiet; then
            echo "No metadata changes to commit"
          else
            git commit -m "Track QQ Linux ${{ steps.check.outputs.version }}"
            git push
          fi

      - name: Publish GitHub Release
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if compgen -G "downloads/*" > /dev/null; then
            if gh release view "${{ steps.check.outputs.tag }}" >/dev/null 2>&1; then
              gh release edit "${{ steps.check.outputs.tag }}" \
                --title "QQ Linux ${{ steps.check.outputs.version }}" \
                --notes-file release-notes.md \
                --latest
              gh release upload "${{ steps.check.outputs.tag }}" downloads/* --clobber
            else
              gh release create "${{ steps.check.outputs.tag }}" downloads/* \
                --title "QQ Linux ${{ steps.check.outputs.version }}" \
                --notes-file release-notes.md \
                --latest
            fi
          else
            if gh release view "${{ steps.check.outputs.tag }}" >/dev/null 2>&1; then
              gh release edit "${{ steps.check.outputs.tag }}" \
                --title "QQ Linux ${{ steps.check.outputs.version }}" \
                --notes-file release-notes.md \
                --latest
            else
              gh release create "${{ steps.check.outputs.tag }}" \
                --title "QQ Linux ${{ steps.check.outputs.version }}" \
                --notes-file release-notes.md \
                --latest
            fi
          fi
