name: Track QQ Linux

on:
  workflow_dispatch:
  schedule:
    - cron: "43 */6 * * *"

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Test
        run: python -m unittest discover -s tests

      - name: Check latest version
        id: check
        run: python scripts/track.py --check

      - name: Update metadata and download assets
        if: steps.check.outputs.changed == 'true'
        run: python scripts/track.py --update --download

      - name: Commit versions.json
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add versions.json
          git commit -m "Track QQ Linux ${{ steps.check.outputs.version }}"
          git push

      - name: Publish GitHub Release
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if compgen -G "downloads/*" > /dev/null; then
            gh release create "${{ steps.check.outputs.tag }}" downloads/* \
              --title "QQ Linux ${{ steps.check.outputs.version }}" \
              --notes-file release-notes.md
          else
            gh release create "${{ steps.check.outputs.tag }}" \
              --title "QQ Linux ${{ steps.check.outputs.version }}" \
              --notes-file release-notes.md
          fi
